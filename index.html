<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Рацион Сахалина">
<meta name="theme-color" content="#0b0f18">
<meta name="description" content="Персональный трекер питания — продукты Сахалина, нутриенты, суточные нормы">
<link rel="manifest" id="pwa-manifest">
<link rel="apple-touch-icon" id="apple-icon">
<title>Рацион Сахалина</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0f18; --s1:#131928; --s2:#1a2236; --s3:#222840; --s4:#2a3354;
  --border:rgba(255,255,255,.07); --border2:rgba(255,255,255,.13);
  --text:#dde4f0; --muted:#5a6a85; --muted2:#7a8fa8;
  --green:#2ecc8a; --amber:#f5a623; --red:#e8524a; --teal:#1fd0e8;
  --nav-h:64px; --top-h:52px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Golos Text',sans-serif;font-size:15px}

/* ── TOP BAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;height:var(--top-h);
  background:var(--s1);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;z-index:50
}
.topbar-title{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;color:var(--text)}
.topbar-badge{
  font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;
  background:var(--s3);color:var(--muted2);border:1px solid var(--border2);
  transition:all .2s
}
.topbar-badge.has-sel{background:rgba(46,204,138,.15);color:var(--green);border-color:rgba(46,204,138,.3)}

/* ── SCROLL AREA ── */
.screen{
  position:fixed;top:var(--top-h);bottom:calc(var(--nav-h) + var(--safe-bottom));
  left:0;right:0;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch
}
.screen-inner{padding:12px 12px 20px}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
  background:var(--s1);border-top:1px solid var(--border2);
  display:flex;z-index:50
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;transition:all .15s;border:none;background:transparent;
  color:var(--muted);padding:6px 0
}
.nav-btn.active{color:var(--teal)}
.nav-btn .nb-icon{font-size:20px;line-height:1}
.nav-btn .nb-label{font-size:10px;font-weight:500;letter-spacing:.02em}
.nav-btn .nb-count{
  font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;
  background:var(--red);color:#fff;min-width:16px;text-align:center;
  display:none
}
.nav-btn.active .nb-icon{filter:drop-shadow(0 0 6px var(--teal))}

/* ── GROUP HEADER ── */
.grp-head{
  display:flex;align-items:center;gap:8px;
  padding:14px 4px 8px;margin-top:4px
}
.grp-head:first-child{padding-top:4px;margin-top:0}
.grp-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.grp-name{font-family:'Unbounded',sans-serif;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted2)}
.grp-count{font-size:11px;color:var(--muted);background:var(--s3);padding:1px 7px;border-radius:8px}

/* ── PRODUCT ROW ── */
.prod-list{display:flex;flex-direction:column;gap:2px}
.prod-row{
  display:flex;align-items:center;gap:10px;
  padding:11px 12px;border-radius:12px;
  background:var(--s2);border:1.5px solid transparent;
  transition:all .15s;cursor:pointer;position:relative
}
.prod-row.sel{border-color:var(--sel-color, var(--green));background:var(--s3)}
.prod-row:active{opacity:.8}
.prod-emoji{font-size:22px;line-height:1;flex-shrink:0;width:30px;text-align:center}
.prod-text{flex:1;min-width:0}
.prod-name{font-size:14px;font-weight:500;color:var(--text);line-height:1.2}
.prod-dose{font-size:11px;color:var(--muted);margin-top:1px}
.prod-check{
  width:24px;height:24px;border-radius:50%;flex-shrink:0;
  border:2px solid var(--border2);background:transparent;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:transparent;transition:all .15s
}
.prod-row.sel .prod-check{background:var(--sel-color,var(--green));border-color:transparent;color:#fff}
.prod-info-btn{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  background:var(--s3);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--muted);cursor:pointer;transition:all .12s
}
.prod-info-btn:active{background:var(--s4);color:var(--text)}

/* ── ANALYSIS SCREEN ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .big{font-size:48px;margin-bottom:14px}
.empty-state p{font-size:14px;line-height:1.6}

.section-title{
  font-family:'Unbounded',sans-serif;font-size:10px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;color:var(--muted);
  padding:16px 0 8px
}
.section-title:first-child{padding-top:4px}

/* selected chips */
.sel-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.sel-chip{
  display:flex;align-items:center;gap:5px;padding:6px 10px;
  background:var(--s2);border:1px solid var(--border2);border-radius:20px;
  font-size:12px;color:var(--text)
}
.sel-chip-x{color:var(--muted);margin-left:2px;cursor:pointer;font-size:13px}
.reset-btn{
  width:100%;margin-top:8px;padding:10px;border-radius:10px;
  border:1px solid var(--border2);background:transparent;
  color:var(--muted);font-family:'Golos Text',sans-serif;font-size:13px;cursor:pointer
}

/* nut bars */
.nut-row{margin-bottom:8px}
.nut-top{display:flex;justify-content:space-between;margin-bottom:3px}
.nut-name{font-size:13px;color:var(--text)}
.nut-pct{font-size:12px;font-weight:600}
.bar-track{height:6px;background:var(--s3);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .4s ease}

/* suggestion cards */
.sug-card{
  background:var(--s2);border:1px solid var(--border2);border-radius:12px;
  padding:12px 14px;margin-bottom:8px
}
.sug-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sug-ico{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sug-ttl{font-size:13px;font-weight:600;color:var(--text)}
.sug-txt{font-size:12px;color:var(--muted2);line-height:1.55;margin-bottom:7px}
.sug-alts{display:flex;flex-wrap:wrap;gap:5px}
.sug-alt{
  font-size:11px;padding:4px 10px;border-radius:10px;cursor:pointer;
  transition:opacity .1s;font-weight:500
}
.sug-alt:active{opacity:.7}

/* ── GAPS SCREEN ── */
.gap-card{
  background:var(--s2);border-radius:12px;padding:13px 14px;margin-bottom:8px;
  border-left:3px solid transparent;transition:opacity .2s
}
.gap-card.solved{opacity:.55;border-left-color:var(--green)}
.gap-card.partial{border-left-color:var(--amber)}
.gap-card.crit{border-left-color:var(--red)}
.gap-card.open{border-left-color:var(--amber)}
.gap-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.gap-left{display:flex;align-items:center;gap:8px}
.gap-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.gap-nut{font-size:13px;font-weight:600;color:var(--text)}
.gap-badge{font-size:11px;font-weight:600;white-space:nowrap}
.gap-desc{font-size:12px;color:var(--muted2);line-height:1.55;margin-bottom:7px}
.gap-srcs{display:flex;flex-wrap:wrap;gap:5px}
.gap-src{font-size:11px;padding:3px 9px;border-radius:10px;font-weight:500}
.gap-src-ok{background:rgba(46,204,138,.12);color:var(--green);border:1px solid rgba(46,204,138,.2)}
.gap-src-tip{background:var(--s3);color:var(--muted2);border:1px solid var(--border2)}
.gap-src-warn{background:rgba(245,166,35,.1);color:var(--amber);border:1px solid rgba(245,166,35,.2)}

/* ── PORTION DIALOG ── */
.portion-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:300;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(4px)
}
.portion-overlay.open{display:flex}
.portion-sheet{
  background:var(--s2);border-radius:20px 20px 0 0;
  width:100%;padding-bottom:calc(16px + var(--safe-bottom));
  animation:slideUp .2s ease
}
.portion-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 8px}
.portion-head{padding:12px 20px 16px;border-bottom:1px solid var(--border)}
.portion-prod{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.portion-emoji{font-size:26px}
.portion-name{font-size:16px;font-weight:600;color:var(--text)}
.portion-rec{font-size:12px;color:var(--muted);margin-top:2px}
.portion-body{padding:20px 20px 8px}
.portion-label{font-size:12px;color:var(--muted2);margin-bottom:10px;line-height:1.5}
.portion-input-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.portion-minus,.portion-plus{
  width:44px;height:44px;border-radius:12px;flex-shrink:0;
  background:var(--s3);border:1px solid var(--border2);
  color:var(--text);font-size:22px;font-weight:300;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s;-webkit-tap-highlight-color:transparent
}
.portion-minus:active,.portion-plus:active{background:var(--s4)}
.portion-input-wrap{flex:1;position:relative}
.portion-input{
  width:100%;height:44px;border-radius:12px;
  background:var(--s3);border:1.5px solid var(--border2);
  color:var(--text);font-size:22px;font-weight:600;text-align:center;
  font-family:'Golos Text',sans-serif;outline:none;
  transition:border-color .15s
}
.portion-input:focus{border-color:var(--teal)}
.portion-unit{
  font-size:13px;color:var(--muted);text-align:center;margin-top:5px
}
.portion-presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.portion-preset{
  font-size:12px;padding:6px 12px;border-radius:20px;
  background:var(--s3);border:1px solid var(--border2);
  color:var(--muted2);cursor:pointer;transition:all .12s;
  -webkit-tap-highlight-color:transparent
}
.portion-preset:active{opacity:.7}
.portion-preset.active-preset{background:rgba(31,208,232,.15);color:var(--teal);border-color:rgba(31,208,232,.3)}
.portion-btns{display:flex;gap:10px;padding:0 20px}
.portion-confirm{
  flex:1;height:50px;border-radius:14px;border:none;
  background:var(--green);color:#0b0f18;
  font-family:'Golos Text',sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;transition:opacity .12s
}
.portion-confirm:active{opacity:.8}
.portion-cancel{
  height:50px;padding:0 20px;border-radius:14px;
  border:1px solid var(--border2);background:transparent;
  color:var(--muted);font-family:'Golos Text',sans-serif;font-size:15px;cursor:pointer
}
.portion-remove{
  height:50px;padding:0 16px;border-radius:14px;
  border:1px solid rgba(232,82,74,.3);background:transparent;
  color:var(--red);font-family:'Golos Text',sans-serif;font-size:13px;cursor:pointer
}
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);
  z-index:200;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(4px)
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--s2);border-radius:20px 20px 0 0;
  width:100%;max-height:88vh;overflow-y:auto;
  animation:slideUp .22s ease;padding-bottom:var(--safe-bottom)
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0}
.modal-head{padding:16px 18px 0}
.modal-badge{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:8px}
.modal-name{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:2px}
.modal-latin{font-size:12px;color:var(--muted);margin-bottom:4px}
.modal-dose{font-size:13px;color:var(--amber);font-weight:500;margin-bottom:16px}
.modal-body{padding:0 18px 24px}
.msec{margin-top:16px}
.msec-title{font-family:'Unbounded',sans-serif;font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.msec p{font-size:13px;color:#a8bccf;line-height:1.7}
.use-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.use-tag{font-size:12px;padding:4px 10px;border-radius:20px;background:var(--s3);color:var(--text);border:1px solid var(--border2)}
.season-bar{display:flex;gap:3px;margin-top:7px;flex-wrap:wrap}
.month{font-size:11px;font-weight:600;padding:4px 8px;border-radius:6px;border:1px solid var(--border2);color:var(--muted);background:var(--s1)}
.month.on-plant{background:rgba(46,204,138,.15);color:var(--green);border-color:rgba(46,204,138,.3)}
.month.on-sea{background:rgba(31,208,232,.15);color:var(--teal);border-color:rgba(31,208,232,.3)}
.month.on-meat{background:rgba(232,82,74,.1);color:#f08080;border-color:rgba(232,82,74,.25)}
.nut-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.nt{font-size:12px;padding:3px 9px;border-radius:20px;font-weight:500}
.nt-full{background:rgba(46,204,138,.15);color:var(--green);border:1px solid rgba(46,204,138,.25)}
.nt-part{background:rgba(245,166,35,.12);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
.warn-box{margin-top:10px;padding:10px 13px;background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.2);border-radius:8px;font-size:13px;color:#fde68a;line-height:1.6}
/* modal add button */
.modal-add-btn{
  width:calc(100% - 36px);margin:12px 18px 4px;padding:14px;
  border-radius:12px;border:none;font-family:'Golos Text',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;transition:all .15s
}
.modal-add-btn.add{background:var(--green);color:#0b0f18}
.modal-add-btn.remove{background:var(--s3);color:var(--red);border:1px solid rgba(232,82,74,.3)}

/* scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">🌿 Рацион Сахалина</div>
  <div class="topbar-badge" id="topBadge">Ничего не выбрано</div>
</div>

<!-- SCREENS -->
<div class="screen" id="screen-products"><div class="screen-inner" id="productList"></div></div>
<div class="screen" id="screen-analysis" style="display:none"><div class="screen-inner" id="analysisContent"></div></div>
<div class="screen" id="screen-gaps" style="display:none"><div class="screen-inner" id="gapsContent"></div></div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="btn-products" onclick="showTab('products')">
    <div class="nb-icon">🛒</div>
    <div class="nb-label">Продукты</div>
  </button>
  <button class="nav-btn" id="btn-analysis" onclick="showTab('analysis')">
    <div class="nb-icon">📊</div>
    <div class="nb-label">Анализ</div>
    <div class="nb-count" id="badge-analysis"></div>
  </button>
  <button class="nav-btn" id="btn-gaps" onclick="showTab('gaps')">
    <div class="nb-icon">⚠️</div>
    <div class="nb-label">Пробелы</div>
    <div class="nb-count" id="badge-gaps"></div>
  </button>
</nav>

<!-- PORTION DIALOG -->
<div class="portion-overlay" id="portionOverlay">
  <div class="portion-sheet">
    <div class="portion-handle"></div>
    <div class="portion-head">
      <div class="portion-prod">
        <span class="portion-emoji" id="pEmoji"></span>
        <div>
          <div class="portion-name" id="pName"></div>
          <div class="portion-rec" id="pRec"></div>
        </div>
      </div>
    </div>
    <div class="portion-body">
      <div class="portion-label" id="pLabel"></div>
      <div class="portion-input-row">
        <button class="portion-minus" id="pMinus">−</button>
        <div class="portion-input-wrap">
          <input class="portion-input" id="pInput" type="number" inputmode="decimal" min="0">
        </div>
        <button class="portion-plus" id="pPlus">+</button>
      </div>
      <div class="portion-unit" id="pUnit"></div>
      <div class="portion-presets" id="pPresets"></div>
    </div>
    <div class="portion-btns" id="pBtns"></div>
  </div>
</div>

<!-- MODAL (bottom sheet) -->
<div class="modal-overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div id="mAddBtn"></div>
    <div class="modal-head">
      <div class="modal-badge" id="mBadge"></div>
      <div class="modal-name" id="mName"></div>
      <div class="modal-latin" id="mLatin"></div>
      <div class="modal-dose" id="mDose"></div>
    </div>
    <div class="modal-body">
      <div class="msec"><div class="msec-title">О продукте</div><p id="mDesc"></p></div>
      <div class="msec"><div class="msec-title">Ключевые нутриенты</div><div class="nut-tags" id="mNuts"></div></div>
      <div class="msec"><div class="msec-title">Как употреблять</div><p id="mUse"></p><div class="use-tags" id="mUseTags"></div></div>
      <div class="msec">
        <div class="msec-title">Сезон на Сахалине</div>
        <p id="mSeasonText"></p>
        <div class="season-bar" id="mSeasonBar"></div>
      </div>
      <div id="mWarn"></div>
    </div>
  </div>
</div>

<script>
const F=2,P=1,N=0,NA=-1;
const MO=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];

// Portion config per product key: unit label, step, presets[], defaultVal (= recommended dose in that unit)
const PORTION={
  // greens
  nettle:   {unit:'г',    step:10,  presets:[30,50,100,150], def:75},
  cheremsha:{unit:'г',    step:10,  presets:[20,50,80,120],  def:50},
  fern:     {unit:'г',    step:10,  presets:[50,100,150,200],def:120},
  burdock:  {unit:'г',    step:10,  presets:[50,100,150,200],def:120},
  dand:     {unit:'г',    step:10,  presets:[30,50,100,150], def:75},
  limonnik: {unit:'г',    step:5,   presets:[10,20,30,50],   def:25},
  dudnik:   {unit:'мл',   step:5,   presets:[10,20,30,50],   def:20},
  eleu:     {unit:'кап.', step:5,   presets:[10,20,30,40],   def:25},
  // berries
  klopovka: {unit:'г',    step:10,  presets:[20,30,50,80],   def:40},
  rose:     {unit:'г',    step:5,   presets:[5,10,15,20],    def:12},
  seabuck:  {unit:'г',    step:10,  presets:[30,50,100,150], def:75},
  brusnika: {unit:'г',    step:10,  presets:[50,100,150,200],def:120},
  morozka:  {unit:'г',    step:10,  presets:[50,80,120,150], def:100},
  // vegs
  cucumber: {unit:'г',    step:20,  presets:[50,100,150,200],def:150},
  tomato:   {unit:'г',    step:20,  presets:[50,100,150,200],def:150},
  pumpkinveg:{unit:'г',   step:20,  presets:[50,100,150,200],def:150},
  horseradish:{unit:'ч.л.',step:0.5,presets:[0.5,1,2,3],     def:1},
  // sea
  kelp:     {unit:'г',    step:5,   presets:[5,10,20,50],    def:10},
  grape:    {unit:'г',    step:10,  presets:[30,50,80,100],  def:60},

// ─── STATE ───────────────────────────────────────────────────────────────────
const selected=new Set();       // keys of selected products
const portions={};              // k -> actual amount entered by user
let currentTab='products';
let modalKey=null;
let portionKey=null;            // which product is being portioned right now

// ─── PRODUCTS TAB ────────────────────────────────────────────────────────────
function renderProducts(){
  const el=document.getElementById('productList'); el.innerHTML='';
  groups.forEach(grp=>{
    const prods=products.filter(p=>p.g===grp.id);
    if(!prods.length) return;
    const gh=document.createElement('div'); gh.className='grp-head';
    gh.innerHTML=`<div class="grp-dot" style="background:${grp.color}"></div><span class="grp-name">${grp.label}</span><span class="grp-count">${prods.length}</span>`;
    el.appendChild(gh);
    const list=document.createElement('div'); list.className='prod-list';
    prods.forEach(p=>{
      const row=document.createElement('div');
      const isSel=selected.has(p.k);
      row.className='prod-row'+(isSel?' sel':'');
      row.style.setProperty('--sel-color',grp.color);
      const pc=getPC(p.k);
      const amtLabel=isSel&&portions[p.k]!=null?`<span style="font-size:11px;font-weight:600;color:${grp.color}">${portions[p.k]} ${pc.unit}</span>`:'';
      row.innerHTML=`<span class="prod-emoji">${p.icon}</span>
        <div class="prod-text">
          <div class="prod-name">${p.name} ${amtLabel}</div>
          <div class="prod-dose">${p.dose}</div>
        </div>
        <div class="prod-check">✓</div>
        <div class="prod-info-btn" data-k="${p.k}">ℹ</div>`;
      row.querySelector('.prod-info-btn').addEventListener('click',e=>{e.stopPropagation();openModal(p.k);});
      row.addEventListener('click',e=>{if(e.target.closest('.prod-info-btn')) return; openPortionDialog(p.k);});
      list.appendChild(row);
    });
    el.appendChild(list);
  });
}

// ─── PORTION DIALOG ──────────────────────────────────────────────────────────
function openPortionDialog(k){
  const p=products.find(x=>x.k===k); if(!p) return;
  const grp=groups.find(g=>g.id===p.g);
  const pc=getPC(k);
  portionKey=k;
  const isEdit=selected.has(k);
  const currentVal=isEdit&&portions[k]!=null?portions[k]:pc.def;

  document.getElementById('pEmoji').textContent=p.icon;
  document.getElementById('pName').textContent=p.name;
  document.getElementById('pRec').textContent='Рекомендуемая доза: '+p.dose;
  document.getElementById('pLabel').textContent=
    isEdit?'Измени количество или убери продукт из сегодняшнего рациона:':
    'Сколько съешь сегодня?';
  document.getElementById('pUnit').textContent=pc.unit;

  const input=document.getElementById('pInput');
  input.value=currentVal;
  input.step=pc.step;

  // presets
  const presetsEl=document.getElementById('pPresets'); presetsEl.innerHTML='';
  pc.presets.forEach(v=>{
    const btn=document.createElement('button'); btn.className='portion-preset';
    btn.textContent=v+' '+pc.unit;
    if(v===currentVal) btn.classList.add('active-preset');
    btn.addEventListener('click',()=>{
      input.value=v;
      presetsEl.querySelectorAll('.portion-preset').forEach(b=>b.classList.remove('active-preset'));
      btn.classList.add('active-preset');
    });
    presetsEl.appendChild(btn);
  });

  // ± buttons
  document.getElementById('pMinus').onclick=()=>{
    const v=Math.max(0,parseFloat(input.value||0)-pc.step);
    input.value=Math.round(v*10)/10;
    syncPresetHighlight();
  };
  document.getElementById('pPlus').onclick=()=>{
    const v=parseFloat(input.value||0)+pc.step;
    input.value=Math.round(v*10)/10;
    syncPresetHighlight();
  };
  input.addEventListener('input',syncPresetHighlight);

  function syncPresetHighlight(){
    const cur=parseFloat(input.value);
    presetsEl.querySelectorAll('.portion-preset').forEach(b=>{
      b.classList.toggle('active-preset',parseFloat(b.textContent)===cur);
    });
  }

  // buttons
  const btns=document.getElementById('pBtns'); btns.innerHTML='';
  const cancelBtn=document.createElement('button'); cancelBtn.className='portion-cancel';
  cancelBtn.textContent='Отмена'; cancelBtn.onclick=closePortionDialog;
  btns.appendChild(cancelBtn);

  if(isEdit){
    const removeBtn=document.createElement('button'); removeBtn.className='portion-remove';
    removeBtn.textContent='Убрать'; removeBtn.onclick=()=>{
      selected.delete(k); delete portions[k];
      closePortionDialog(); refreshAfterPortionChange();
    };
    btns.appendChild(removeBtn);
  }

  const confirmBtn=document.createElement('button'); confirmBtn.className='portion-confirm';
  confirmBtn.style.background=grp.color;
  confirmBtn.textContent=isEdit?'Обновить':'Добавить';
  confirmBtn.onclick=()=>{
    const val=parseFloat(document.getElementById('pInput').value);
    if(!val||val<=0){ closePortionDialog(); return; }
    selected.add(k);
    portions[k]=val;
    closePortionDialog();
    refreshAfterPortionChange();
  };
  btns.appendChild(confirmBtn);

  document.getElementById('portionOverlay').classList.add('open');
  setTimeout(()=>input.focus(),100);
}

function closePortionDialog(){
  document.getElementById('portionOverlay').classList.remove('open');
  portionKey=null;
}

function refreshAfterPortionChange(){
  renderProducts();
  updateBadges();
  if(currentTab==='analysis') renderAnalysis();
  if(currentTab==='gaps') renderGapsTab();
}

// ─── ANALYSIS TAB ────────────────────────────────────────────────────────────

  const el=document.getElementById('analysisContent'); el.innerHTML='';
  if(!selected.size){
    el.innerHTML='<div class="empty-state"><div class="big">📊</div><p>Выберите продукты во вкладке «Продукты»<br>и здесь появится анализ рациона</p></div>';
    return;
  }
  const selProds=products.filter(p=>selected.has(p.k));
  const scores=calcScores(selProds);

  // Selected chips
  const t1=document.createElement('div'); t1.className='section-title'; t1.textContent='Выбрано сегодня';
  el.appendChild(t1);
  const chips=document.createElement('div'); chips.className='sel-chips';
  selProds.forEach(p=>{
    const grp=groups.find(g=>g.id===p.g);
    const pc=getPC(p.k);
    const amt=portions[p.k]??pc.def;
    const chip=document.createElement('div'); chip.className='sel-chip';
    chip.style.cssText=`border-color:${grp.color}44;cursor:pointer`;

    chip.addEventListener('click',e=>{
      if(e.target.closest('.sel-chip-x')) return;
      openPortionDialog(p.k);
    });
    chip.querySelector('.sel-chip-x').addEventListener('click',e=>{
      e.stopPropagation();
      selected.delete(p.k); delete portions[p.k];
      document.querySelectorAll('.prod-row').forEach(r=>{
        if(r.querySelector('.prod-info-btn')?.dataset.k===p.k) r.classList.remove('sel');
      });
      updateBadges(); renderAnalysis();
    });
    chips.appendChild(chip);
  });
  el.appendChild(chips);
  const rb=document.createElement('button'); rb.className='reset-btn'; rb.textContent='Сбросить всё';
  rb.onclick=()=>{
    selected.clear();
    Object.keys(portions).forEach(k=>delete portions[k]);
    document.querySelectorAll('.prod-row').forEach(r=>r.classList.remove('sel'));
    updateBadges();renderAnalysis();renderGapsTab();renderProducts();
  };
  el.appendChild(rb);

  // Nutrient bars
  const t2=document.createElement('div'); t2.className='section-title'; t2.textContent='Покрытие нутриентов';
  el.appendChild(t2);
  nutDefs.forEach(nd=>{
    const pct=Math.min(100,scores[nd.k]||0);
    const color=pct>=80?'var(--green)':pct>=40?'var(--amber)':'var(--red)';
    const row=document.createElement('div'); row.className='nut-row';
    row.innerHTML=`<div class="nut-top"><span class="nut-name">${nd.name}</span><span class="nut-pct" style="color:${color}">${pct}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>`;
    el.appendChild(row);
  });

  // Suggestions
  const sugs=getSuggestions(selProds,scores);
  const t3=document.createElement('div'); t3.className='section-title'; t3.textContent='Что добавить для нормы';
  el.appendChild(t3);
  if(sugs.length===1&&sugs[0].allGood){
    const ok=document.createElement('div');
    ok.style.cssText='background:rgba(46,204,138,.1);border:1px solid rgba(46,204,138,.25);border-radius:12px;padding:16px;text-align:center';
    ok.innerHTML='<div style="font-size:32px;margin-bottom:8px">🏆</div><div style="font-size:14px;font-weight:600;color:var(--green);margin-bottom:4px">Рацион на отлично!</div><div style="font-size:12px;color:var(--muted2);line-height:1.5">Все нутриенты покрыты на 80%+.<br>Так держать — организм скажет спасибо.</div>';
    el.appendChild(ok);
  } else {
    sugs.forEach(s=>{
      const card=document.createElement('div'); card.className='sug-card';
      const head=document.createElement('div'); head.className='sug-head';
      const ico=document.createElement('div'); ico.className='sug-ico'; ico.style.background=s.bg; ico.textContent=s.icon;
      const ttl=document.createElement('div'); ttl.className='sug-ttl'; ttl.textContent=s.title;
      head.appendChild(ico); head.appendChild(ttl); card.appendChild(head);
      const txt=document.createElement('div'); txt.className='sug-txt'; txt.textContent=s.text; card.appendChild(txt);
      if(s.alts&&s.alts.length){
        const aw=document.createElement('div'); aw.className='sug-alts';
        s.alts.forEach(a=>{
          const btn=document.createElement('span'); btn.className='sug-alt';
          btn.style.cssText=`background:${a.bg};color:${a.color};border:1px solid ${a.border}`;
          btn.textContent=a.label;
          btn.addEventListener('click',()=>{
            openPortionDialog(a.key);
          });
          aw.appendChild(btn);
        });
        card.appendChild(aw);
      }
      el.appendChild(card);
    });
  }
}

// ─── GAPS TAB ────────────────────────────────────────────────────────────────
function renderGapsTab(){
  const el=document.getElementById('gapsContent'); el.innerHTML='';
  const selProds=products.filter(p=>selected.has(p.k));
  const scores=selected.size?calcScores(selProds):{};
  const selKeys=new Set(selProds.map(p=>p.k));

  const sub=document.createElement('div');
  sub.style.cssText='font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5';
  sub.textContent=selected.size?`Обновлено для твоего рациона (${selected.size} продуктов)`:'Выбери продукты во вкладке «Продукты» — панель обновится автоматически';
  el.appendChild(sub);

  GAPS_DEF.forEach(g=>{
    const hasSolver=g.solvers.some(k=>selKeys.has(k));
    const hasPartial=g.partials.some(k=>selKeys.has(k));
    const score=scores[g.nutKey]||0;
    let status,statusColor,statusLabel;
    if(!selected.size){status='unknown';statusColor='var(--muted)';statusLabel='';}
    else if(hasSolver&&score>=60){status='solved';statusColor='var(--green)';statusLabel='✓ Закрыт';}
    else if(hasSolver||hasPartial||score>=30){status='partial';statusColor='var(--amber)';statusLabel='◑ Частично';}
    else{status=g.baseSev==='crit'?'crit':'open';statusColor=g.baseSev==='crit'?'var(--red)':'var(--amber)';statusLabel=g.baseSev==='crit'?'✗ Критично':'✗ Не закрыт';}

    const card=document.createElement('div'); card.className='gap-card '+status;
    const top=document.createElement('div'); top.className='gap-top';
    const left=document.createElement('div'); left.className='gap-left';
    const dot=document.createElement('div'); dot.className='gap-dot';
    dot.style.cssText=`background:${statusColor};box-shadow:${status!=='unknown'&&status!=='solved'?`0 0 6px ${statusColor}88`:'none'}`;
    const name=document.createElement('div'); name.className='gap-nut'; name.textContent=g.name;
    left.appendChild(dot); left.appendChild(name);
    const badge=document.createElement('div'); badge.className='gap-badge';
    badge.style.color=statusColor; badge.textContent=statusLabel;
    top.appendChild(left); top.appendChild(badge); card.appendChild(top);

    const desc=document.createElement('div'); desc.className='gap-desc';
    desc.textContent=status==='solved'?g.descSolved:g.descBase; card.appendChild(desc);

    const srcs=document.createElement('div'); srcs.className='gap-srcs';
    if(selected.size){
      [...g.solvers,...g.partials].filter(k=>selKeys.has(k)&&g.srcsLabel[k]).forEach(k=>{
        const t=document.createElement('span'); t.className='gap-src gap-src-ok'; t.textContent=g.srcsLabel[k]; srcs.appendChild(t);
      });
      if(status!=='solved'){
        g.solvers.filter(k=>!selKeys.has(k)).slice(0,3).forEach(k=>{
          const p=products.find(x=>x.k===k); if(!p) return;
          const t=document.createElement('span'); t.className='gap-src gap-src-tip'; t.textContent='+ '+p.name; srcs.appendChild(t);
        });
      }
    } else {
      g.solvers.slice(0,4).forEach(k=>{const p=products.find(x=>x.k===k);if(!p) return;const t=document.createElement('span');t.className='gap-src gap-src-tip';t.textContent=p.name;srcs.appendChild(t);});
    }
    g.tips.forEach(s=>{const t=document.createElement('span');t.className='gap-src gap-src-warn';t.textContent=s;srcs.appendChild(t);});
    card.appendChild(srcs); el.appendChild(card);
  });
}

// ─── LOGIC HELPERS ───────────────────────────────────────────────────────────
function calcScores(prods){
  const scores={};
  nutDefs.forEach(nd=>{scores[nd.k]=0;});
  prods.forEach(p=>{
    const pc=getPC(p.k);
    const actual=portions[p.k]??pc.def;
    // ratio: how much they ate vs recommended dose (capped at 1.5 to avoid gaming)
    const ratio=Math.min(1.5, actual/pc.def);
    nutDefs.forEach(nd=>{
      const v=p.nuts[nd.k]??NA;
      if(v!==NA) scores[nd.k]+=(WEIGHT[v]||0)*ratio;
    });
  });
  nutDefs.forEach(nd=>{scores[nd.k]=Math.min(100,Math.round(scores[nd.k]));});
  return scores;
}

function getSuggestions(selProds,scores){
  const selKeys=new Set(selProds.map(p=>p.k));
  const suggestions=[];
  function topFor(nutKey,count=3){
    return products.filter(p=>!selKeys.has(p.k)&&(p.nuts[nutKey]===F||p.nuts[nutKey]===P))
      .sort((a,b)=>(b.nuts[nutKey]||0)-(a.nuts[nutKey]||0)).slice(0,count)
      .map(p=>({key:p.k,label:`${p.icon} ${p.name}`,bg:p.nuts[nutKey]===F?'rgba(46,204,138,.12)':'rgba(245,166,35,.1)',color:p.nuts[nutKey]===F?'#2ecc8a':'#f5a623',border:p.nuts[nutKey]===F?'rgba(46,204,138,.25)':'rgba(245,166,35,.2)'}));
  }
  const recs={b12:'Только в мясе и морепродуктах',vitD:'Лосось — лучший источник D3',iron:'Говядина — гемовое железо в 3–5× лучше',omega:'Лосось или рыбий жир закроют полностью',vitC:'Черемша, шиповник, облепиха — рекордсмены',calcium:'Есть в растениях, но нужен D3 для усвоения',protein:'Говядина, лосось, яйцо — полный профиль',carbs:'Гречка — лучший выбор по нутриентам',mag:'Гречка, конопля, тыквенные семечки',zinc:'Говядина, краб, икра ежа',sel:'Лосось, минтай, тыквенные семечки',iod:'Морская капуста — 5 г = суточная норма',fiber:'Гречка, лопух, чечевица',adapt:'Лимонник и элеутерококк — адаптогены Сахалина',antioxid:'Ягоды, облепиха, шиповник',vitA:'Крапива, черемша, облепиха',vitE:'Облепиха, конопля, тыквенные семечки',vitK:'Крапива, одуванчик',bvit:'Гречка, чечевица, минтай'};

  // Check if all nutrients are well covered (>=80%)
  const allGood=nutDefs.every(nd=>(scores[nd.k]||0)>=80);
  if(allGood) return [{allGood:true}];

  // Sort ALL nutrients by score ascending — show bottom 5
  const sorted=nutDefs.map(nd=>({nd,pct:scores[nd.k]||0})).sort((a,b)=>a.pct-b.pct);
  sorted.slice(0,5).forEach(({nd,pct})=>{
    const alts=topFor(nd.k,4); if(!alts.length) return;
    const isCrit=nd.crit||(pct<20);
    suggestions.push({
      icon:isCrit?'🔴':pct<60?'🟡':'✅',
      bg:isCrit?'rgba(232,82,74,.12)':pct<60?'rgba(245,166,35,.1)':'rgba(46,204,138,.08)',
      title:`${nd.name} — ${pct}%`,
      text:pct>=80?`Хорошо покрыт. Можно усилить: ${recs[nd.k]||''}`:recs[nd.k]||'Разнообрази рацион',
      alts
    });
  });

  // D3 special reminder if not covered
  if((scores['vitD']||0)<60&&!selKeys.has('vitd3sup')&&!selKeys.has('fishoil')&&!selKeys.has('salmon')&&!selKeys.has('sealoil'))
    suggestions.push({icon:'☀️',bg:'rgba(250,204,21,.12)',title:'Витамин D — приоритет зимой',text:'На Сахалине самый массовый дефицит. Рыбий жир закрывает D3 и омега-3 сразу.',alts:topFor('vitD',3)});

  return suggestions.slice(0,6);
}

// ─── TAB NAVIGATION ──────────────────────────────────────────────────────────
function showTab(tab){
  currentTab=tab;
  ['products','analysis','gaps'].forEach(t=>{
    document.getElementById('screen-'+t).style.display=t===tab?'':'none';
    document.getElementById('btn-'+t).classList.toggle('active',t===tab);
  });
  if(tab==='analysis') renderAnalysis();
  if(tab==='gaps') renderGapsTab();
}

function updateBadges(){
  const n=selected.size;
  const badge=document.getElementById('topBadge');
  badge.textContent=n?`${n} выбрано`:'Ничего не выбрано';
  badge.classList.toggle('has-sel',n>0);

  // critical gaps count
  const selProds=products.filter(p=>selected.has(p.k));
  const scores=n?calcScores(selProds):{};
  const selKeys=new Set(selProds.map(p=>p.k));
  const openCrit=GAPS_DEF.filter(g=>{
    const hasSolver=g.solvers.some(k=>selKeys.has(k));
    const score=scores[g.nutKey]||0;
    return n>0&&g.baseSev==='crit'&&!(hasSolver&&score>=60);
  }).length;
  const bg=document.getElementById('badge-gaps');
  bg.textContent=openCrit||'';
  bg.style.display=openCrit?'block':'none';

  const ba=document.getElementById('badge-analysis');
  const lowCount=n?nutDefs.filter(nd=>(scores[nd.k]||0)<50).length:0;
  ba.textContent=lowCount||'';
  ba.style.display=lowCount?'block':'none';
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(k){
  const p=products.find(x=>x.k===k); if(!p) return;
  modalKey=k;
  const grp=groups.find(g=>g.id===p.g);
  document.getElementById('mBadge').textContent=grp.label;
  document.getElementById('mBadge').style.cssText=`background:${grp.color}22;color:${grp.color};border:1px solid ${grp.color}44`;
  document.getElementById('mName').textContent=p.name;
  document.getElementById('mLatin').textContent=p.icon;
  document.getElementById('mDose').textContent='Суточная доза: '+p.dose;
  document.getElementById('mDesc').textContent=p.desc;
  const ne=document.getElementById('mNuts'); ne.innerHTML='';
  nutDefs.forEach(nd=>{const v=p.nuts[nd.k];if(v===F||v===P){const t=document.createElement('span');t.className='nt '+(v===F?'nt-full':'nt-part');t.textContent=(v===F?'✓ ':'◑ ')+nd.name;ne.appendChild(t);}});
  document.getElementById('mUse').textContent=p.use;
  const ut=document.getElementById('mUseTags'); ut.innerHTML='';
  p.useTags.forEach(t=>{const s=document.createElement('span');s.className='use-tag';s.textContent=t;ut.appendChild(s);});
  document.getElementById('mSeasonText').textContent=p.season;
  const sb=document.getElementById('mSeasonBar'); sb.innerHTML='';
  if(!p.seasonM.length){sb.innerHTML='<span style="font-size:12px;color:var(--muted)">Доступен круглый год</span>';}
  else{MO.forEach((m,i)=>{const s=document.createElement('span');s.className='month'+(p.seasonM.includes(i)?' on-'+p.seasonType:'');s.textContent=m;sb.appendChild(s);});}
  const ww=document.getElementById('mWarn'); ww.innerHTML='';
  if(p.warn) ww.innerHTML=`<div class="msec"><div class="msec-title">Важно</div><div class="warn-box">⚠ ${p.warn}</div></div>`;
  // add/remove button
  const ab=document.getElementById('mAddBtn'); ab.innerHTML='';
  const isSel=selected.has(k);
  const btn=document.createElement('button');
  btn.className='modal-add-btn '+(isSel?'remove':'add');
  btn.textContent=isSel?'✎ Изменить количество':'+ Добавить в рацион';
  btn.onclick=()=>{
    closeModal();
    setTimeout(()=>openPortionDialog(k),120);
  };
  ab.appendChild(btn);
  document.getElementById('overlay').classList.add('open');
  // swipe down to close
  let startY=0;
  const modal=document.getElementById('modal');
  modal.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;},{passive:true});
  modal.addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-startY>80) closeModal();},{passive:true});
}
function closeOverlay(e){if(e.target===document.getElementById('overlay')) closeModal();}
function closeModal(){document.getElementById('overlay').classList.remove('open');modalKey=null;}

// ─── INIT ────────────────────────────────────────────────────────────────────
renderProducts();
renderGapsTab();
updateBadges();

// ─── PWA SETUP ───────────────────────────────────────────────────────────────
(function(){
  // Generate icon via canvas (192x192 and 512x512)
  function makeIcon(size){
    const c=document.createElement('canvas');
    c.width=c.height=size;
    const ctx=c.getContext('2d');
    // background
    ctx.fillStyle='#0b0f18';
    ctx.beginPath();
    ctx.roundRect(0,0,size,size,size*0.22);
    ctx.fill();
    // green circle
    const cx=size/2, cy=size*0.44, r=size*0.28;
    const grd=ctx.createRadialGradient(cx,cy,r*0.1,cx,cy,r);
    grd.addColorStop(0,'#2ecc8a');
    grd.addColorStop(1,'#1a9e66');
    ctx.fillStyle=grd;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
    // leaf emoji substitute — just text
    ctx.fillStyle='#fff';
    ctx.font=`bold ${size*0.32}px serif`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText('🌿',cx,cy);
    // bottom text
    ctx.fillStyle='#7a8fa8';
    ctx.font=`${size*0.095}px sans-serif`;
    ctx.fillText('РАЦИОН',cx,size*0.78);
    ctx.fillStyle='#2ecc8a';
    ctx.font=`bold ${size*0.095}px sans-serif`;
    ctx.fillText('САХАЛИНА',cx,size*0.88);
    return c.toDataURL('image/png');
  }

  const icon192=makeIcon(192);
  const icon512=makeIcon(512);

  // Inject apple touch icon
  document.getElementById('apple-icon').href=icon192;

  // Build manifest object and inject as blob URL
  const manifest={
    name:'Рацион Сахалина',
    short_name:'Рацион',
    description:'Персональный трекер питания — продукты Сахалина, нутриенты, суточные нормы',
    start_url:'.',
    display:'standalone',
    orientation:'portrait',
    background_color:'#0b0f18',
    theme_color:'#0b0f18',
    lang:'ru',
    icons:[
      {src:icon192,sizes:'192x192',type:'image/png',purpose:'any maskable'},
      {src:icon512,sizes:'512x512',type:'image/png',purpose:'any maskable'},
    ]
  };
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
  document.getElementById('pwa-manifest').href=URL.createObjectURL(blob);

  // Register service worker (inline via blob)
  if('serviceWorker' in navigator){
    const swCode=`
const CACHE='racion-sakhalin-v1';
const ASSETS=['/'];
self.addEventListener('install',e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)).catch(()=>{}));
  self.skipWaiting();
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch',e=>{
  if(e.request.method!=='GET') return;
  e.respondWith(
    fetch(e.request).then(r=>{
      const rc=r.clone();
      caches.open(CACHE).then(c=>c.put(e.request,rc));
      return r;
    }).catch(()=>caches.match(e.request).then(r=>r||new Response('Нет подключения',{status:503})))
  );
});
`;
    const swBlob=new Blob([swCode],{type:'application/javascript'});
    const swUrl=URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl,{scope:'./'})
      .then(()=>console.log('SW registered'))
      .catch(e=>console.log('SW error',e));
  }

  // ─── INSTALL BANNER ──────────────────────────────────────────────────────
  let deferredPrompt=null;
  // Inject banner HTML
  const banner=document.createElement('div');
  banner.id='install-banner';
  banner.style.cssText=`
    display:none;position:fixed;bottom:calc(70px + env(safe-area-inset-bottom,0px));
    left:12px;right:12px;z-index:400;
    background:#1a2236;border:1px solid rgba(46,204,138,.35);border-radius:16px;
    padding:14px 16px;box-shadow:0 8px 32px rgba(0,0,0,.5);
    display:none;flex-direction:column;gap:10px;
    animation:slideUp .25s ease;
  `;
  banner.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px">
      <div style="font-size:28px">📲</div>
      <div>
        <div style="font-size:13px;font-weight:600;color:#dde4f0">Установить приложение</div>
        <div style="font-size:11px;color:#5a6a85;margin-top:2px">Работает без интернета, как обычное приложение</div>
      </div>
      <button id="install-close" style="margin-left:auto;background:none;border:none;color:#5a6a85;font-size:20px;cursor:pointer;padding:4px">×</button>
    </div>
    <div style="display:flex;gap:8px">
      <button id="install-btn" style="flex:1;height:42px;border-radius:10px;border:none;background:#2ecc8a;color:#0b0f18;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">Установить</button>
      <button id="install-later" style="height:42px;padding:0 16px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:transparent;color:#7a8fa8;font-size:13px;cursor:pointer;font-family:inherit">Позже</button>
    </div>
  `;
  document.body.appendChild(banner);

  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();
    deferredPrompt=e;
    setTimeout(()=>{ banner.style.display='flex'; },2000);
  });

  document.getElementById('install-btn').addEventListener('click',()=>{
    banner.style.display='none';
    if(deferredPrompt){ deferredPrompt.prompt(); deferredPrompt=null; }
  });
  document.getElementById('install-close').addEventListener('click',()=>banner.style.display='none');
  document.getElementById('install-later').addEventListener('click',()=>banner.style.display='none');

  window.addEventListener('appinstalled',()=>{ banner.style.display='none'; console.log('App installed!'); });
})();
</script>
